name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android_release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keys
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          
          # Decode Google Play Key
          if [[ "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" == {* ]]; then
            echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" > play_sa_key.json
          else
            echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" | base64 -d > play_sa_key.json
          fi

          # Decode Firebase Key
          if [[ "$FIREBASE_SERVICE_ACCOUNT_KEY" == {* ]]; then
            echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > sa_key.json
          else
            echo "$FIREBASE_SERVICE_ACCOUNT_KEY" | base64 -d > sa_key.json
          fi

      - name: Build APK & AAB
        run: |
          flutter build apk --release --android-skip-build-dependency-validation
          flutter build appbundle --release --android-skip-build-dependency-validation
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v2.2.1
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} --release-notes "Release ${{ github.ref_name }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play_sa_key.json
          packageName: org.goforthtech.roombooker
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Cleanup Keys
        if: always()
        run: rm -f play_sa_key.json sa_key.json
