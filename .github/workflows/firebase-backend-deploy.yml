name: Deploy Firebase Backend on merge

on:
  push:
    branches:
      - main

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Decode Keys
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          # The secret might be base64 encoded or raw JSON
          if [[ "$FIREBASE_SERVICE_ACCOUNT_KEY" == {* ]]; then
            echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > sa_key.json
          else
            echo "$FIREBASE_SERVICE_ACCOUNT_KEY" | base64 -d > sa_key.json
          fi

      - name: Deploy Functions and Firestore rules/indexes
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions,firestore:rules,firestore:indexes --project roombooker-5e947
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json

      - name: Cleanup Key
        if: always()
        run: rm -f sa_key.json
