# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    tags:
      - 'v*'

# Grant permissions for the GITHUB_TOKEN to create releases
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Get Package Info
        id: flutter_version
        uses: bungabear/flutter_version_read@main
        with:
          file: ./pubspec.yaml

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keys
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
        run: |
          # The secret might be base64 encoded or raw JSON
          if [[ "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" == {* ]]; then
            echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" > sa_key.json
          else
            echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" | base64 -d > sa_key.json
          fi

      - name: Run tests
        run: flutter test

      - name: Build app
        run: flutter build web --pwa-strategy=none --source-maps

      - name: Upload symbols to Sentry
        run: dart run sentry_dart_plugin
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project roombooker-5e947
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa_key.json

      - name: Cleanup Key
        if: always()
        run: rm -f sa_key.json

      - name: Extract version from tag
        id: extract_version
        run: |
          # Extract version string from tag (v1.2.14+42 -> 1.2.14+42)
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --target ${{ github.sha }} || echo "Release already exists, skipping."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
