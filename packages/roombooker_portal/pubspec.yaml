name: roombooker_portal
description: "The primary user and admin portal for RoomBooker."
version: 1.3.4+54
publish_to: 'none'

resolution: workspace

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  roombooker_core:
    path: ../roombooker_core
  cupertino_icons: ^1.0.6
  auto_route: ^10.0.1
  provider: ^6.1.2
  syncfusion_flutter_calendar: ^31.2.3
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_ui_auth: ^3.0.0
  firebase_ui_oauth_google: ^2.0.0
  google_sign_in: ^6.2.2
  firebase_analytics: ^12.0.3
  shared_preferences: ^2.3.2
  badges: ^3.1.2
  universal_html: ^2.2.4
  package_info_plus: ^9.0.0
  firebase_app_check: ^0.4.1+3
  printing: ^5.14.2
  pdf: ^3.11.3
  sentry_flutter: ^9.4.1
  rxdart: ^0.28.0
  intl: ^0.20.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  auto_route_generator: ^10.0.1
  mocktail: ^1.0.4
  sentry_dart_plugin: ^3.1.1
  flutter_launcher_icons: ^0.14.3
  firebase_core_platform_interface: ^6.0.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: go-forth-technology
