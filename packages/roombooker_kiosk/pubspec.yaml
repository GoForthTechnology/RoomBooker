name: roombooker_kiosk
description: "Specialized hardware terminal for meeting rooms."
version: 1.3.0+50
publish_to: 'none'

resolution: workspace

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  roombooker_core:
    path: ../roombooker_core
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_analytics: ^12.0.3
  shared_preferences: ^2.3.2
  kiosk_mode: ^0.8.0
  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: ^9.2.4
  logger: ^2.6.2
  rxdart: ^0.28.0
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  firebase_core_platform_interface: ^6.0.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
